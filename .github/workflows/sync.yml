name: 每日自动解密

on:
  push:
    branches: [ main ]
  schedule:
    # 每天 UTC 0点（北京时间8点）自动运行
    - cron: '0 0 * * *'
  workflow_dispatch:  # 支持手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install urllib3

      - name: 执行解密脚本
        run: python decode.py

      - name: 提交结果到GitHub
        run: |
          git config --global user.name "AutoBot"
          git config --global user.email "bot@github.com"
          git add decoded_result.txt
          git commit -m "✅ 每日自动更新解密结果 $(date +'%Y-%m-%d')"
          git push
